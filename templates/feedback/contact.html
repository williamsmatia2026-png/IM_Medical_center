{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-primary text-white">
        Contact / Feedback
    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-success">
                Submit Feedback
            </button>

        </form>

    </div>

</div>

{% endblock %}
