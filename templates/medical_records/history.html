<h2>Medical History</h2>

{% for record in records %}

<div>

    <h3>{{ record.visit_date }}</h3>

    <p>
        <strong>Doctor:</strong>
        {{ record.doctor.name }}
    </p>

    <p>
        <strong>Diagnosis:</strong>
        {{ record.diagnosis }}
    </p>

    <p>
        <strong>Treatment:</strong>
        {{ record.treatment }}
    </p>

    <p>
        <strong>Prescription:</strong>
        {{ record.prescription }}
    </p>

</div>

<hr>

{% empty %}

<p>No medical records found.</p>

{% endfor %}
